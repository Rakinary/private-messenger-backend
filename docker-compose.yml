version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: messenger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: messenger_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - messenger_postgres_data:/var/lib/postgresql/data

volumes:
  messenger_postgres_data:
